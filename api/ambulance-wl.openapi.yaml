    AmbulanceExample:
      summary: Sample GP ambulance
      description: |
        Example of GP ambulance with waiting list and predefined conditions
      value:
        id: gp-warenova
        name: Ambulancia všeobecného lekárstva Dr. Warenová
        roomNumber: 356 - 3.posch
        waitingList:
          - id: x321ab3
            name: Jožko Púčik
            patientId: 460527-jozef-pucik
            waitingSince: "2038-12-24T10:05:00.000Z"
            estimatedStart: "2038-12-24T10:35:00.000Z"
            estimatedDurationMinutes: 15
            condition:
            value: Teploty
            code: subfebrilia
            reference: "https://zdravoteka.sk/priznaky/zvysena-telesna-teplota/"
          - id: x321ab4
            name: Ferdinand Trety
            patientId: 780907-ferdinand-tre
            waitingSince: "2038-12-24T10:25:00.000Z"
            estimatedStart: "2038-12-24T10:50:00.000Z"
            estimatedDurationMinutes: 25
            condition:
            value: Nevoľnosť
            code: nausea
            reference: "https://zdravoteka.sk/priznaky/nevolnost/"
        predefinedConditions:
          - value: Teploty
            code: subfebrilia
            reference: "https://zdravoteka.sk/priznaky/zvysena-telesna-teplota/"
            typicalDurationMinutes: 20
          - value: Nevoľnosť
            code: nausea
            reference: "https://zdravoteka.sk/priznaky/nevolnost/"
            typicalDurationMinutes: 45
          - value: Kontrola
            code: followup
            typicalDurationMinutes: 15
          - value: Administratívny úkon
            code: administration
            typicalDurationMinutes: 10
          - value: Odber krvi
            code: blood-test
            typicalDurationMinutes: 10
    OrderItemExample:
      summary: Order item - single medicine
      description: Example of one item in medication order
      value:
        medicineId: "med-001"
        medicineName: "Aspirin 500mg"
        quantity: 100
        unit: "tablets"
        unitPrice: 0.50
        totalPrice: 50.00
    OrderExample:
      summary: Sample medication order
      description: Example of medication order with items
      value:
        id: "order-2024-001"
        pharmacyId: "pharmacy-main"
        supplierId: "supplier-pharma-dist"
        items:
          - medicineId: "med-001"
            medicineName: "Aspirin 500mg"
            quantity: 100
            unit: "tablets"
            unitPrice: 0.50
            totalPrice: 50.00
          - medicineId: "med-002"
