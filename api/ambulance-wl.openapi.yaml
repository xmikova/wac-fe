openapi: 3.0.0
servers:
  - description: Cluster Endpoint
    url: /api
info:
  description: Ambulance Waiting List management for Web-In-Cloud system
  version: "1.0.0"
  title: Waiting List Api
  contact:
    email: xmikova@stuba.sk
  license:
    name: CC BY 4.0
    url: "https://creativecommons.org/licenses/by/4.0/"
tags:
- name: ambulanceWaitingList
  description: Ambulance Waiting List API
- name: ambulanceConditions
  description: Patient conditions and symptoms handled in the ambulance
- name: ambulances
  description: Ambulance details
- name: pharmacyOrders
  description: Pharmacy Orders API
paths:
  "/waiting-list/{ambulanceId}/entries":
    get:
      tags:
        - ambulanceWaitingList
      summary: Provides the ambulance waiting list
      operationId: getWaitingListEntries
      description: By using ambulanceId you get list of entries in ambulance waiting list
      parameters:
        - in: path
          name: ambulanceId
          description: pass the id of the particular ambulance
          required: true
          schema:
            type: string
      responses:
        "200":
          description: value of the waiting list entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaitingListEntry"
              examples:
                response:
                  $ref: "#/components/examples/WaitingListEntriesExample"
        "404":
          description: Ambulance with such ID does not exist
    post:
      tags:
        - ambulanceWaitingList
      summary: Saves new entry into waiting list
      operationId: createWaitingListEntry
      description: Use this method to store new entry into the waiting list.
      parameters:
        - in: path
          name: ambulanceId
          description: pass the id of the particular ambulance
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitingListEntry"
            examples:
              request-sample:
                $ref: "#/components/examples/WaitingListEntryExample"
        description: Waiting list entry to store
        required: true
      responses:
        "200":
          description: >-
            Value of the waiting list entry with re-computed estimated time of
            ambulance entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitingListEntry"
              examples:
                updated-response:
                  $ref: "#/components/examples/WaitingListEntryExample"
        "400":
          description: Missing mandatory properties of input object.
        "404":
          description: Ambulance with such ID does not exists
        "409":
          description: Entry with the specified id already exists
  "/waiting-list/{ambulanceId}/entries/{entryId}":
    get:
      tags:
        - ambulanceWaitingList
      summary: Provides details about waiting list entry
      operationId: getWaitingListEntry
      description: >-
        By using ambulanceId and entryId you can details of particular entry
        item ambulance.
      parameters:
        - in: path
          name: ambulanceId
          description: pass the id of the particular ambulance
          required: true
          schema:
            type: string
        - in: path
          name: entryId
          description: pass the id of the particular entry in the waiting list
          required: true
          schema:
            type: string
      responses:
        "200":
          description: value of the waiting list entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitingListEntry"
              examples:
                response:
                  $ref: "#/components/examples/WaitingListEntryExample"
        "404":
          description: Ambulance or Entry with such ID does not exists
    put:
      tags:
        - ambulanceWaitingList
      summary: Updates specific entry
      operationId: updateWaitingListEntry
      description: Use this method to update content of the waiting list entry.
      parameters:
        - in: path
          name: ambulanceId
          description: pass the id of the particular ambulance
          required: true
          schema:
            type: string
        - in: path
          name: entryId
          description: pass the id of the particular entry in the waiting list
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitingListEntry"
            examples:
              request:
                $ref: "#/components/examples/WaitingListEntryExample"
        description: Waiting list entry to update
        required: true
      responses:
        "200":
          description: >-
            value of the waiting list entry with re-computed estimated time of
            ambulance entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitingListEntry"
              examples:
                response:
                  $ref: "#/components/examples/WaitingListEntryExample"
        "403":
          description: >-
            Value of the entryID and the data id is mismatching. Details are
            provided in the response body.
        "404":
          description: Ambulance or Entry with such ID does not exists
    delete:
      tags:
        - ambulanceWaitingList
      summary: Deletes specific entry
      operationId: deleteWaitingListEntry
      description: Use this method to delete the specific entry from the waiting list.
      parameters:
        - in: path
          name: ambulanceId
          description: pass the id of the particular ambulance
          required: true
          schema:
            type: string
        - in: path
          name: entryId
          description: pass the id of the particular entry in the waiting list
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Item deleted
        "404":
          description: Ambulance or Entry with such ID does not exists
  "/waiting-list/{ambulanceId}/condition":
    get:
      tags:
        - ambulanceConditions
      summary: Provides the list of conditions associated with ambulance
      operationId: getConditions
      description: By using ambulanceId you get list of predefined conditions
      parameters:
        - in: path
          name: ambulanceId
          description: pass the id of the particular ambulance
          required: true
          schema:
            type: string
      responses:
        "200":
          description: value of the predefined conditions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Condition"
              examples:
                response:
                  $ref: "#/components/examples/ConditionsListExample"
        "404":
          description: Ambulance with such ID does not exists
  "/ambulance":
    post:
      tags:
        - ambulances
      summary: Saves new ambulance definition
      operationId: createAmbulance
      description: Use this method to initialize new ambulance in the system
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Ambulance"
            examples:
              request-sample:
                $ref: "#/components/examples/AmbulanceExample"
        description: Ambulance details to store
        required: true
      responses:
        "200":
          description: >-
            Value of stored ambulance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ambulance"
              examples:
                updated-response:
                  $ref: "#/components/examples/AmbulanceExample"
        "400":
          description: Missing mandatory properties of input object.
        "409":
          description: Entry with the specified id already exists
  "/ambulance/{ambulanceId}":
    delete:
      tags:
        - ambulances
      summary: Deletes specific ambulance
      operationId: deleteAmbulance
      description: Use this method to delete the specific ambulance from the system.
      parameters:
        - in: path
          name: ambulanceId
          description: pass the id of the particular ambulance
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Item deleted
        "404":
          description: Ambulance with such ID does not exist
  "/pharmacy/{pharmacyId}/orders":
    get:
      tags:
        - pharmacyOrders
      summary: Provides the list of medication orders
      operationId: getOrders
      description: By using pharmacyId you get list of all medication orders
      parameters:
        - in: path
          name: pharmacyId
          description: pass the id of the particular pharmacy
          required: true
          schema:
            type: string
      responses:
        "200":
          description: list of medication orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
              examples:
                response:
                  $ref: "#/components/examples/OrdersListExample"
        "404":
          description: Pharmacy with such ID does not exist
    post:
      tags:
        - pharmacyOrders
      summary: Creates new medication order
      operationId: createOrder
      description: Use this method to create new medication order
      parameters:
        - in: path
          name: pharmacyId
          description: pass the id of the particular pharmacy
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
            examples:
              request-sample:
                $ref: "#/components/examples/OrderExample"
        description: Order to create
        required: true
      responses:
        "200":
          description: Order successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                response:
                  $ref: "#/components/examples/OrderExample"
        "400":
          description: Missing mandatory properties of input object.
        "404":
          description: Pharmacy with such ID does not exist
        "409":
          description: Order with the specified id already exists
  "/pharmacy/{pharmacyId}/orders/{orderId}":
    get:
      tags:
        - pharmacyOrders
      summary: Provides details about specific medication order
      operationId: getOrder
      description: By using pharmacyId and orderId you get details of particular order
      parameters:
        - in: path
          name: pharmacyId
          description: pass the id of the particular pharmacy
          required: true
          schema:
            type: string
        - in: path
          name: orderId
          description: pass the id of the particular order
          required: true
          schema:
            type: string
      responses:
        "200":
          description: order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                response:
                  $ref: "#/components/examples/OrderExample"
        "404":
          description: Pharmacy or Order with such ID does not exist
    put:
      tags:
        - pharmacyOrders
      summary: Updates specific medication order
      operationId: updateOrder
      description: Use this method to update content of the medication order (items, etc.)
      parameters:
        - in: path
          name: pharmacyId
          description: pass the id of the particular pharmacy
          required: true
          schema:
            type: string
        - in: path
          name: orderId
          description: pass the id of the particular order
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
            examples:
              request:
                $ref: "#/components/examples/OrderExample"
        description: Order to update
        required: true
      responses:
        "200":
          description: Order successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                response:
                  $ref: "#/components/examples/OrderExample"
        "404":
          description: Pharmacy or Order with such ID does not exist
        "409":
          description: Order ID mismatch
    delete:
      tags:
        - pharmacyOrders
      summary: Cancels specific medication order
      operationId: deleteOrder
      description: Use this method to delete/cancel the specific medication order
      parameters:
        - in: path
          name: pharmacyId
          description: pass the id of the particular pharmacy
          required: true
          schema:
            type: string
        - in: path
          name: orderId
          description: pass the id of the particular order
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Order cancelled
        "404":
          description: Pharmacy or Order with such ID does not exist
  "/pharmacy/{pharmacyId}/orders/{orderId}/status":
    patch:
      tags:
        - pharmacyOrders
      summary: Updates order status
      operationId: updateOrderStatus
      description: Use this method to change the order status (created, confirmed, delivered, cancelled)
      parameters:
        - in: path
          name: pharmacyId
          description: pass the id of the particular pharmacy
          required: true
          schema:
            type: string
        - in: path
          name: orderId
          description: pass the id of the particular order
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/OrderStatus"
        description: New order status
        required: true
      responses:
        "200":
          description: Order status successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                response:
                  $ref: "#/components/examples/OrderExample"
        "400":
          description: Invalid status value
        "404":
          description: Pharmacy or Order with such ID does not exist
components:
  schemas:
    WaitingListEntry:
      type: object
      required: [id, patientId, waitingSince, estimatedDurationMinutes]
      properties:
        id:
          type: string
          example: x321ab3
          description: Unique id of the entry in this waiting list
        name:
          type: string
          example: Jožko Púčik
          description: Name of patient in waiting list
        patientId:
          type: string
          example: 460527-jozef-pucik
          description: Unique identifier of the patient known to Web-In-Cloud system
        waitingSince:
          type: string
          format: date-time
          example: "2038-12-24T10:05:00Z"
          description: Timestamp since when the patient entered the waiting list
        estimatedStart:
          type: string
          format: date-time
          example: "2038-12-24T10:35:00Z"
          description: Estimated time of entering ambulance. Ignored on post.
        estimatedDurationMinutes:
          type: integer
          format: int32
          example: 15
          description: >-
            Estimated duration of ambulance visit. If not provided then it will
            be computed based on condition and ambulance settings
        condition:
          $ref: "#/components/schemas/Condition"
      example:
        $ref: "#/components/examples/WaitingListEntryExample"
    Condition:
      description: "Describes disease, symptoms, or other reasons of patient   visit"
      required:
        - value
      properties:
        value:
          type: string
          example: Teploty
        code:
          type: string
          example: subfebrilia
        reference:
          type: string
          format: url
          example: "https://zdravoteka.sk/priznaky/zvysena-telesna-teplota/"
          description: Link to encyclopedical explanation of the patient's condition
        typicalDurationMinutes:
          type: integer
          format: int32
          example: 20
      example:
        $ref: "#/components/examples/ConditionExample"
    Ambulance:
      type: object
      required: [ "id", "name", "roomNumber"]
      properties:
        id:
          type: string
          example: dentist-warenova
          description: Unique identifier of the ambulance
        name:
          type: string
          example: Zubná ambulancia Dr. Warenová
          description: Human readable display name of the ambulance
        roomNumber:
          type: string
          example: 356 - 3.posch
        waitingList:
          type: array
          items:
            $ref: '#/components/schemas/WaitingListEntry'
        predefinedConditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
      example:
          $ref: "#/components/examples/AmbulanceExample"
    OrderStatus:
      type: string
      enum:
        - created
        - confirmed
        - delivered
        - cancelled
      description: Status of the medication order
      example: created
    OrderItem:
      type: object
      required: [medicineId, quantity, unitPrice]
      properties:
        medicineId:
          type: string
          example: "med-123"
          description: Unique identifier of the medicine
        medicineName:
          type: string
          example: "Aspirin 500mg"
          description: Name of the medicine (for reference)
        quantity:
          type: integer
          format: int32
          example: 100
          description: Quantity to order
        unit:
          type: string
          example: "tablets"
          description: Unit of measurement (tablets, bottles, boxes, etc.)
        unitPrice:
          type: number
          format: double
          example: 0.50
          description: Price per unit
        totalPrice:
          type: number
          format: double
          example: 50.00
          description: Total price for this item (quantity * unitPrice)
      example:
        $ref: "#/components/examples/OrderItemExample"
    Order:
      type: object
      required: [id, pharmacyId, items, status, createdAt]
      properties:
        id:
          type: string
          example: "order-2024-001"
          description: Unique identifier of the order
        pharmacyId:
          type: string
          example: "pharmacy-main"
          description: Identifier of the pharmacy placing the order
        supplierId:
          type: string
          example: "supplier-pharma-dist"
          description: Identifier of the supplier (optional)
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
          description: List of ordered medicines
        status:
          $ref: "#/components/schemas/OrderStatus"
        createdAt:
          type: string
          format: date-time
          example: "2024-05-01T10:15:00Z"
          description: Timestamp when order was created
        updatedAt:
          type: string
          format: date-time
          example: "2024-05-01T14:30:00Z"
          description: Timestamp when order was last updated
        createdBy:
          type: string
          example: "user-123"
          description: User ID who created the order
        notes:
          type: string
          example: "Urgent delivery needed"
          description: Additional notes for the order
      example:
        $ref: "#/components/examples/OrderExample"
  examples:
    WaitingListEntryExample:
      summary: Ľudomír Zlostný waiting
      description: |
        Entry represents a patient waiting in the ambulance prep room with
        defined symptoms
      value:
        id: x321ab3
        name: Ľudomír Zlostný
        patientId: 74895-ludomir-zlostny
        waitingSince: "2038-12-24T10:05:00.000Z"
        estimatedStart: "2038-12-24T10:35:00.000Z"
        estimatedDurationMinutes: 15
        condition:
          value: Nevoľnosť
          code: nausea
          reference: "https://zdravoteka.sk/priznaky/nevolnost/"
    ConditionExample:
      summary: Conditions and symptoms
      description: list of few symptoms that can be chosen by patients
      value:
        valuee: Teploty
        code: subfebrilia
        reference: >-
          https://zdravoteka.sk/priznaky/zvysena-telesna-teplota/
    WaitingListEntriesExample:
      summary: List of waiting patients
      description: |
        Example waiting list containing 2 patients
      value:
      - id: x321ab3
        name: Jožko Púčik
        patientId: 460527-jozef-pucik
        waitingSince: "2038-12-24T10:05:00.000Z"
        estimatedStart: "2038-12-24T10:35:00.000Z"
        estimatedDurationMinutes: 15
        condition:
          value: Teploty
          code: subfebrilia
          reference: "https://zdravoteka.sk/priznaky/zvysena-telesna-teplota/"
      - id: x321ab4
        name: Ferdinand Trety
        patientId: 780907-ferdinand-tre
        waitingSince: "2038-12-24T10:25:00.000Z"
        estimatedStart: "2038-12-24T10:50:00.000Z"
        estimatedDurationMinutes: 25
        condition:
          value: Nevoľnosť
          code: nausea
          reference: "https://zdravoteka.sk/priznaky/nevolnost/"
    ConditionsListExample:
      summary: Sample of GP ambulance conditions
      description: |
        Example list of possible conditions, symptoms, and visit reasons
      value:
        - value: Teploty
          code: subfebrilia
          reference: "https://zdravoteka.sk/priznaky/zvysena-telesna-teplota/"
          typicalDurationMinutes: 20
        - value: Nevoľnosť
